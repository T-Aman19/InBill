name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      platforms:
        description: 'Platforms to build — comma-separated subset of: macos-14,macos-13,ubuntu-22.04,windows-latest (empty = all)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  # Resolves which platforms to build. On a tag push all four run; on a
  # manual workflow_dispatch the optional `platforms` input filters the list.
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - id: resolve
        run: |
          ALL='[
            {"platform":"macos-14","target":"aarch64-apple-darwin","bundles":"dmg"},
            {"platform":"macos-13","target":"x86_64-apple-darwin","bundles":"dmg"},
            {"platform":"ubuntu-22.04","target":"x86_64-unknown-linux-gnu","bundles":"appimage,deb"},
            {"platform":"windows-latest","target":"x86_64-pc-windows-msvc","bundles":"nsis"}
          ]'
          FILTER="${{ inputs.platforms }}"
          if [ -z "$FILTER" ]; then
            echo "matrix=$(echo $ALL | jq -c .)" >> $GITHUB_OUTPUT
          else
            echo "matrix=$(echo $ALL | jq -c --arg f "$FILTER" '[.[] | select(.platform | inside($f))]')" >> $GITHUB_OUTPUT
          fi

  build:
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      # Tauri 2 on Linux requires WebKitGTK 4.1, GTK 3, and the Ayatana
      # AppIndicator library (for the tray icon feature used by this app).
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential \
            file

      - name: Install frontend dependencies
        run: bun install

      - name: Generate app icons
        shell: bash
        run: cd apps/desktop && bun x tauri icon src-tauri/icons/icon.png --output src-tauri/icons

      - name: Build server sidecar (macOS / Linux)
        if: runner.os != 'Windows'
        run: |
          cd apps/server
          bun build src/index.ts --compile \
            --outfile "../desktop/src-tauri/binaries/inbill-server-${{ matrix.target }}"

      - name: Build server sidecar (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd apps/server
          bun build src/index.ts --compile \
            --outfile "../desktop/src-tauri/binaries/inbill-server-${{ matrix.target }}.exe"

      # Only inject signing env vars when the certificate secret is actually
      # set. Tauri crashes if APPLE_CERTIFICATE is present but empty.
      - name: Configure macOS code signing
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            echo "APPLE_CERTIFICATE=$APPLE_CERTIFICATE" >> $GITHUB_ENV
            echo "APPLE_CERTIFICATE_PASSWORD=${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" >> $GITHUB_ENV
            echo "APPLE_SIGNING_IDENTITY=${{ secrets.APPLE_SIGNING_IDENTITY }}" >> $GITHUB_ENV
            echo "APPLE_ID=${{ secrets.APPLE_ID }}" >> $GITHUB_ENV
            echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}" >> $GITHUB_ENV
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}" >> $GITHUB_ENV
          fi

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # linuxdeploy and its plugins are AppImages. GitHub Actions runners
          # don't expose FUSE, so tell them to extract-and-run instead.
          APPIMAGE_EXTRACT_AND_RUN: "1"
          # Prevent linuxdeploy from stripping bundled binaries — strip can
          # fail on CI when the binary format doesn't match the host strip version.
          NO_STRIP: "true"
        with:
          projectPath: apps/desktop
          tauriScript: bun x tauri
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
          tagName: ${{ github.ref_name }}
          releaseName: InBill ${{ github.ref_name }}
          releaseBody: |
            See the assets below to download InBill for your platform.
          releaseDraft: true
          prerelease: false
