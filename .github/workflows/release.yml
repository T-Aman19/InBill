name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14        # Apple Silicon
            target: aarch64-apple-darwin
            bundles: dmg
          - platform: macos-13        # Intel Mac
            target: x86_64-apple-darwin
            bundles: dmg
          - platform: windows-latest  # x86_64 Windows
            target: x86_64-pc-windows-msvc
            bundles: nsis

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install frontend dependencies
        run: bun install

      - name: Generate app icons
        run: cd apps/desktop && bun x tauri icon src-tauri/icons/icon.jpg --output src-tauri/icons

      - name: Build server sidecar (macOS)
        if: runner.os == 'macOS'
        run: |
          cd apps/server
          bun build src/index.ts --compile \
            --outfile "../desktop/src-tauri/binaries/inbill-server-${{ matrix.target }}"

      - name: Build server sidecar (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd apps/server
          bun build src/index.ts --compile \
            --outfile "../desktop/src-tauri/binaries/inbill-server-${{ matrix.target }}.exe"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing — set these secrets in repo Settings → Secrets → Actions
          # Leave unset for unsigned dev builds (Gatekeeper will block those on other Macs)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop
          tauriScript: bun x tauri
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}
          tagName: ${{ github.ref_name }}
          releaseName: InBill ${{ github.ref_name }}
          releaseBody: |
            See the assets below to download InBill for your platform.
          releaseDraft: true
          prerelease: false
