name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14       # Apple Silicon (aarch64)
            target: aarch64-apple-darwin
            bundles: dmg
          - platform: windows-latest  # x86_64 Windows
            target: x86_64-pc-windows-msvc
            bundles: nsis

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workdir: apps/desktop/src-tauri

      - name: Install macOS dependencies
        if: matrix.platform == 'macos-14'
        run: brew install create-dmg

      - name: Install frontend dependencies
        run: bun install

      - name: Build server sidecar (macOS)
        if: matrix.platform == 'macos-14'
        run: |
          cd apps/server
          bun build src/index.ts --compile \
            --outfile "../desktop/src-tauri/binaries/inbill-server-${{ matrix.target }}"

      - name: Build server sidecar (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          cd apps/server
          bun build src/index.ts --compile \
            --outfile "../desktop/src-tauri/binaries/inbill-server-${{ matrix.target }}.exe"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tauriScript: bunx tauri
          args: --bundles ${{ matrix.bundles }} --target ${{ matrix.target }}
          tagName: ${{ github.ref_name }}
          releaseName: InBill ${{ github.ref_name }}
          releaseBody: |
            See the assets below to download InBill for your platform.
          releaseDraft: true
          prerelease: false
